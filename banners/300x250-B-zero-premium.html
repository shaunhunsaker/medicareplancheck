<!DOCTYPE html>
<html><head>
<meta charset="UTF-8"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{width:300px;height:250px;overflow:hidden;font-family:'Arial',sans-serif;background:#0a8f5c;cursor:pointer;}
  .wrap{width:300px;height:250px;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px;}

  .bg-circle{position:absolute;width:300px;height:300px;border-radius:50%;background:rgba(255,255,255,.05);top:-80px;right:-80px;animation:breathe 4s ease-in-out infinite;}
  @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}

  .eyebrow{font-size:10px;font-weight:700;letter-spacing:.1em;color:rgba(255,255,255,.8);text-transform:uppercase;margin-bottom:10px;animation:fadeIn .5s ease .2s both;}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}

  .headline{font-size:22px;font-weight:900;color:#fff;text-align:center;line-height:1.2;margin-bottom:6px;animation:fadeUp .5s ease .3s both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .headline span{color:#fbbf24;}

  .sub{font-size:11px;color:rgba(255,255,255,.82);text-align:center;line-height:1.45;margin-bottom:14px;animation:fadeUp .5s ease .5s both;}

  .badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:100px;padding:5px 14px;font-size:10px;font-weight:600;color:#fff;margin-bottom:14px;animation:fadeUp .5s ease .4s both;}

  .cta{background:#fff;color:#0a8f5c;font-size:12px;font-weight:900;padding:10px 24px;border-radius:100px;animation:fadeUp .5s ease .7s both,pulseCta 2.2s ease 1.5s infinite;}
  @keyframes pulseCta{0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,.4)}70%{box-shadow:0 0 0 8px rgba(255,255,255,0)}}

  .disc{position:absolute;bottom:4px;font-size:6.5px;color:rgba(255,255,255,.3);text-align:center;width:100%;padding:0 8px;}
</style>
</head>
<body>
<div class="wrap" onclick="window.open('https://www.medicareplancheck.org','_blank')">
  <div class="bg-circle"></div>
  <div class="eyebrow">Did You Know?</div>
  <div class="headline">Many Medicare Plans<br/>Cost <span>$0/Month</span></div>
  <div class="badge">✓ Plus extra benefits included</div>
  <div class="sub">Dental · Vision · OTC Allowance<br/>A free check takes under 5 minutes.</div>
  <div class="cta">See $0 Plans Near Me →</div>
  <div class="disc">Not affiliated with Medicare or the U.S. government. $0 premium plans vary by location.</div>
</div>
</body></html>
