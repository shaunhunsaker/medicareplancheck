<!DOCTYPE html>
<html><head>
<meta charset="UTF-8"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{width:300px;height:250px;overflow:hidden;font-family:'Arial',sans-serif;background:linear-gradient(150deg,#1f2937 0%,#0f2d5e 100%);cursor:pointer;}
  .wrap{width:300px;height:250px;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}

  /* Scanline pulse */
  .scan{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#1a56db,transparent);animation:scan 2.5s ease-in-out infinite;}
  @keyframes scan{0%{top:0;opacity:0}10%{opacity:1}90%{opacity:1}100%{top:250px;opacity:0}}

  .icon{font-size:30px;margin-bottom:8px;animation:shake 3s ease-in-out 1s infinite;}
  @keyframes shake{0%,90%,100%{transform:rotate(0)}93%{transform:rotate(-8deg)}96%{transform:rotate(8deg)}99%{transform:rotate(-4deg)}}

  .question{font-size:17px;font-weight:900;color:#fff;text-align:center;line-height:1.3;margin-bottom:10px;animation:fadeUp .5s ease .2s both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .question span{color:#7dd3fc;}

  .items{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;animation:fadeUp .5s ease .4s both;width:100%;}
  .item{display:flex;align-items:center;gap:7px;font-size:10.5px;color:rgba(255,255,255,.8);}
  .item .dot{width:6px;height:6px;border-radius:50%;background:#fbbf24;flex-shrink:0;}

  .cta{background:linear-gradient(90deg,#1a56db,#2563eb);color:#fff;font-size:12px;font-weight:800;padding:10px 22px;border-radius:100px;animation:fadeUp .5s ease .6s both,pulseCta 2.2s ease 1.5s infinite;}
  @keyframes pulseCta{0%,100%{box-shadow:0 0 0 0 rgba(26,86,219,.5)}70%{box-shadow:0 0 0 8px rgba(26,86,219,0)}}

  .disc{position:absolute;bottom:4px;font-size:6.5px;color:rgba(255,255,255,.28);text-align:center;width:100%;padding:0 8px;}
</style>
</head>
<body>
<div class="wrap" onclick="window.open('https://www.medicareplancheck.org','_blank')">
  <div class="scan"></div>
  <div class="icon">💡</div>
  <div class="question">Are You Missing Out on<br/><span>Medicare Benefits?</span></div>
  <div class="items">
    <div class="item"><div class="dot"></div>Up to $150/mo OTC allowance</div>
    <div class="item"><div class="dot"></div>Free dental, vision & hearing</div>
    <div class="item"><div class="dot"></div>$0 premium plan options</div>
    <div class="item"><div class="dot"></div>Free gym membership</div>
  </div>
  <div class="cta">Find Out What I Qualify For</div>
  <div class="disc">Not affiliated with Medicare or the U.S. government. Benefits vary by plan and location.</div>
</div>
</body></html>
