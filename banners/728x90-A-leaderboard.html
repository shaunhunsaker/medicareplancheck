<!DOCTYPE html>
<html><head>
<meta charset="UTF-8"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{width:728px;height:90px;overflow:hidden;font-family:'Arial',sans-serif;background:linear-gradient(90deg,#0f2d5e 0%,#1a3a6e 60%,#0a5e3a 100%);cursor:pointer;}
  .wrap{width:728px;height:90px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;gap:16px;}

  .logo{font-size:13px;font-weight:900;color:#fff;white-space:nowrap;flex-shrink:0;}
  .logo span{color:#7dd3fc;}

  .divider{width:1px;height:40px;background:rgba(255,255,255,.15);flex-shrink:0;}

  .badge{background:linear-gradient(135deg,#f59e0b,#fbbf24);border-radius:8px;padding:6px 14px;text-align:center;flex-shrink:0;animation:pop .5s cubic-bezier(.175,.885,.32,1.275) .2s both;}
  @keyframes pop{from{transform:scale(0.8);opacity:0}to{transform:scale(1);opacity:1}}
  .badge-amount{font-size:22px;font-weight:900;color:#0f2d5e;line-height:1;}
  .badge-label{font-size:8px;font-weight:700;color:rgba(15,45,94,.7);text-transform:uppercase;}

  .copy{flex:1;min-width:0;animation:fadeUp .5s ease .3s both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .copy-head{font-size:15px;font-weight:900;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .copy-head span{color:#fbbf24;}
  .copy-sub{font-size:10px;color:rgba(255,255,255,.65);margin-top:2px;}

  .cta{background:#1a56db;color:#fff;font-size:12px;font-weight:800;padding:10px 18px;border-radius:8px;white-space:nowrap;flex-shrink:0;animation:fadeUp .5s ease .5s both,pulse 2.2s ease 1.5s infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(26,86,219,.6)}70%{box-shadow:0 0 0 6px rgba(26,86,219,0)}}

  .disc{font-size:7px;color:rgba(255,255,255,.2);white-space:nowrap;flex-shrink:0;align-self:flex-end;padding-bottom:4px;}
</style>
</head>
<body>
<div class="wrap" onclick="window.open('https://www.medicareplancheck.org','_blank')">
  <div class="logo">Medicare<span>Plan</span>Check</div>
  <div class="divider"></div>
  <div class="badge">
    <div class="badge-amount">$150</div>
    <div class="badge-label">mo. benefit</div>
  </div>
  <div class="copy">
    <div class="copy-head">Your Medicare plan could include <span>$150/month in extra benefits</span></div>
    <div class="copy-sub">Dental · Vision · OTC Allowance · $0 premiums available · Free to check</div>
  </div>
  <div class="cta">Check My Benefits →</div>
  <div class="disc">Not affiliated with Medicare or the U.S. gov.</div>
</div>
</body></html>
